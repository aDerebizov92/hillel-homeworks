<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ДЗ 3.2 — Числа та рядки</title>
</head>
<body>
  <h1>ДЗ 3.2 — рядки від користувача</h1>
  <p>Відкрий консоль (F12 → Console). З'являться 3 вікна для введення рядків.</p>

  <script>
    // Отримуємо від користувача 3 рядки за допомогою prompt()
    const first  = prompt("Введи перший рядок:");
    const second = prompt("Введи другий рядок:");
    const third  = prompt("Введи третій рядок:");

    // Виводимо всі три ОДНІЄЮ командою через шаблонний рядок.
    // Шаблонний рядок — це лапки-апострофи `...`, а ${змінна} вставляє значення.
    // Порядок довільний — тут навмисно інший, ніж вводили: другий, третій, перший.
    console.log(`${second}, ${third}, ${first}`);
  </script>
</body>
</html>
